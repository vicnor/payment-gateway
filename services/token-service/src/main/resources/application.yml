spring:
  application:
    name: token-service

server:
  port: 8103

management:
  endpoints:
    web:
      exposure:
        include: health

gateway:
  token:
    ttl-seconds: 1800
    cors:
      allowed-origins:
        - http://localhost:3000
    session-secret:
      enabled: false
    rate-limit:
      max-attempts: 100
      window-seconds: 1800
    internal:
      callers:
        - id: payment-service
          secret: "${PAYMENT_SERVICE_INTERNAL_SECRET}"
