spring:
  application:
    name: token-service
  jackson:
    property-naming-strategy: SNAKE_CASE

server:
  port: 8103

management:
  endpoints:
    web:
      exposure:
        include: health

gateway:
  token:
    ttl-seconds: 1800
    cors:
      allowed-origins:
        - http://localhost:3000
    session-secret:
      enabled: false
    internal:
      callers:
        - id: payment-service
          secret: "${PAYMENT_SERVICE_INTERNAL_SECRET}"
